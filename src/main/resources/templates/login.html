<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DMS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header text-center">
                        <h3>DMS System Login</h3>
                    </div>
                    <div class="card-body">
                        <!-- Error Message -->
                        <div th:if="${param.error}" class="alert alert-danger">
                            Forkert brugernavn eller adgangskode
                        </div>
                        
                        <!-- Logout Success -->
                        <div th:if="${param.logout}" class="alert alert-success">
                            Du er nu logget ud
                        </div>
                        
                        <!-- Login Form -->
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Brugernavn</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="username" 
                                       name="username" 
                                       placeholder="managercoop1"
                                       required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Adgangskode</label>
                                <input type="password" 
                                       class="form-control" 
                                       id="password" 
                                       name="password" 
                                       placeholder="password"
                                       required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Log ind</button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Test Credentials -->
                <div class="card mt-3">
                    <div class="card-body">
                        <h6>Test Logins:</h6>
                        <small class="d-block mb-2">
                            <strong>Password for alle:</strong> password
                        </small>
                        <small>
                            <strong>Managers:</strong><br>
                            - managercoop1<br>
                            - managercoop2<br>
                            - managercoop3<br>
                            <strong>Workers:</strong><br>
                            - workercoop1<br>
                            - workercoop2<br>
                            - workercoop3
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
