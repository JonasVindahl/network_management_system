<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DMS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header text-center">
                        <h3>DMS System Login</h3>
                    </div>
                    <div class="card-body">
                        <div id="errorMsg" class="alert alert-danger d-none">
                            Forkert brugernavn eller adgangskode
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Brugernavn (CPF)</label>
                            <input type="text" class="form-control" id="cpf" 
                                   placeholder="managercoop1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Adgangskode</label>
                            <input type="password" class="form-control" id="password" 
                                   placeholder="password" required>
                        </div>
                        <div class="d-grid">
                            <button onclick="doLogin()" class="btn btn-primary">Log ind</button>
                        </div>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-body">
                        <h6>Test Logins:</h6>
                        <small class="d-block mb-2">
                            <strong>Password for alle:</strong> password
                        </small>
                        <small>
                            <strong>Managers:</strong><br>
                            - managercoop1<br>
                            - managercoop2<br>
                            - managercoop3<br>
                            <strong>Workers:</strong><br>
                            - workercoop1<br>
                            - workercoop2<br>
                            - workercoop3
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function doLogin() {
            const cpf = document.getElementById('cpf').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cpf, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    document.cookie = `jwt=${data.token}; path=/; SameSite=Strict`;
                    window.location.href = '/frontend';
                } else {
                    document.getElementById('errorMsg').classList.remove('d-none');
                }
            } catch (error) {
                document.getElementById('errorMsg').classList.remove('d-none');
            }
        }

        // Login ved Enter-tast
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
