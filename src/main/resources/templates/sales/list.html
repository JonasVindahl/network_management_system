<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales List - DMS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">DMS System</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" th:text="${userName}">User</span>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Sales</h1>
            <a href="/web/sales/create" class="btn btn-success">+ Create New Sale</a>
        </div>
        
        <!-- Filters -->
        <div class="card mb-4">
            <div class="card-body">
                <form method="get" action="/web/sales/list">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Sale Type</label>
                            <select name="type" class="form-select">
                                <option value="ALL" th:selected="${selectedType == 'ALL'}">All</option>
                                <option value="REGULAR" th:selected="${selectedType == 'REGULAR'}">Regular</option>
                                <option value="COLLECTIVE" th:selected="${selectedType == 'COLLECTIVE'}">Collective</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                <option value="ALL" th:selected="${selectedStatus == 'ALL'}">All</option>
                                <option value="ACTIVE" th:selected="${selectedStatus == 'ACTIVE'}">Active</option>
                                <option value="COMPLETED" th:selected="${selectedStatus == 'COMPLETED'}">Completed</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">&nbsp;</label>
                            <button type="submit" class="btn btn-primary d-block">Filter</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Sales Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Type</th>
                                <th>Material</th>
                                <th>Weight (kg)</th>
                                <th>Price/kg</th>
                                <th>Total Revenue</th>
                                <th>Buyer</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="sale : ${sales}">
                                <td th:text="${sale.saleId ?: sale.collectiveSaleId}">1</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${sale.saleType == 'REGULAR'} ? 'bg-primary' : 'bg-info'"
                                          th:text="${sale.saleType}">REGULAR</span>
                                </td>
                                <td th:text="${sale.materialName}">Plastic</td>
                                <td th:text="${#numbers.formatDecimal(sale.weight, 1, 2)}">45.50</td>
                                <td th:text="${#numbers.formatDecimal(sale.pricePerKg, 1, 2)}">2.50</td>
                                <td th:text="${#numbers.formatDecimal(sale.totalRevenue, 1, 2)}">113.75</td>
                                <td th:text="${sale.buyerName}">RecycleCorp</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${sale.status == 'COMPLETED'} ? 'bg-success' : 'bg-warning'"
                                          th:text="${sale.status}">COMPLETED</span>
                                </td>
                                <td th:text="${#temporals.format(sale.soldAt ?: sale.expectedSaleDate, 'dd/MM/yyyy')}">15/03/2026</td>
                                <td>
                                    <a th:href="@{/web/sales/details/{id}(id=${sale.saleId ?: sale.collectiveSaleId})}" 
                                       class="btn btn-sm btn-outline-primary">View</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(sales)}">
                                <td colspan="10" class="text-center text-muted">No sales found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
