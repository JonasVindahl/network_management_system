<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DMS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">DMS System</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/web/sales/list">Sales</a>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        <h1>Dashboard</h1>
        <div class="row mt-4">
            <!-- Sales Card -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Sales Management</h5>
                        <p class="card-text">View and manage sales transactions</p>
                        <a href="/web/sales/list" class="btn btn-primary">Go to Sales</a>
                    </div>
                </div>
            </div>
            
            <!-- Analytics Card -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Analytics</h5>
                        <p class="card-text">View performance metrics and reports</p>
                        <a href="/web/analytics" class="btn btn-primary">View Analytics</a>
                    </div>
                </div>
            </div>
            
            <!-- Collective Sales Card -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Collective Sales</h5>
                        <p class="card-text">Manage collaborative sales</p>
                        <a href="/web/collective-sales" class="btn btn-primary">Manage</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
